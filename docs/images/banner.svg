<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Compose stack: 4 service containers + DB, vertically centered -->
  <!-- Stack: 4 × 26px containers + 3 × 6px gaps = 122px. Center in 200: start at y=39 -->
  <g transform="translate(52, 0)">
    <!-- Connection lines (behind containers) -->
    <line x1="90" y1="52" x2="112" y2="82" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
    <line x1="90" y1="84" x2="112" y2="88" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
    <line x1="90" y1="116" x2="112" y2="96" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
    <line x1="90" y1="148" x2="112" y2="102" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>

    <!-- CWMP -->
    <rect x="0" y="39" width="88" height="26" rx="4" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.85"/>
    <circle cx="14" cy="52" r="3.5" fill="#4CAF50" opacity="0.9"/>
    <text x="24" y="56" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.7">CWMP</text>

    <!-- NBI -->
    <rect x="0" y="71" width="88" height="26" rx="4" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.75"/>
    <circle cx="14" cy="84" r="3.5" fill="#4CAF50" opacity="0.8"/>
    <text x="24" y="88" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.6">NBI</text>

    <!-- FS -->
    <rect x="0" y="103" width="88" height="26" rx="4" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.65"/>
    <circle cx="14" cy="116" r="3.5" fill="#4CAF50" opacity="0.7"/>
    <text x="24" y="120" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.5">FS</text>

    <!-- GUI -->
    <rect x="0" y="135" width="88" height="26" rx="4" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.55"/>
    <circle cx="14" cy="148" r="3.5" fill="#4CAF50" opacity="0.6"/>
    <text x="24" y="152" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.4">GUI</text>

    <!-- MongoDB cylinder (right of stack, vertically centered at y=100) -->
    <g transform="translate(114, 72)">
      <ellipse cx="18" cy="6" rx="18" ry="6" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
      <rect x="0" y="6" width="36" height="44" fill="url(#glow)" stroke="none"/>
      <line x1="0" y1="6" x2="0" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
      <line x1="36" y1="6" x2="36" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
      <ellipse cx="18" cy="50" rx="18" ry="6" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
      <ellipse cx="18" cy="22" rx="18" ry="5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
      <text x="18" y="40" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.4">DB</text>
    </g>
  </g>

  <!-- Title — vertically centered with subtitle as a pair -->
  <text x="220" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    GenieACS Container
  </text>

  <!-- Subtitle -->
  <text x="222" y="122" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Production-ready containers and Helm charts for TR-069
  </text>

  <!-- Decorative: abstract router/CPE devices on right, centered -->
  <g transform="translate(740, 35)" opacity="0.18">
    <!-- Router 1 -->
    <rect x="0" y="10" width="44" height="26" rx="4" fill="#ffffff"/>
    <circle cx="12" cy="23" r="3" fill="#2E7D32"/>
    <circle cx="22" cy="23" r="3" fill="#2E7D32"/>
    <!-- Antenna -->
    <line x1="36" y1="10" x2="40" y2="0" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Signal arcs -->
    <path d="M40,0 A8,8 0 0,1 48,-8" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <path d="M40,0 A14,14 0 0,1 54,-14" fill="none" stroke="#ffffff" stroke-width="1"/>

    <!-- Router 2 -->
    <rect x="30" y="56" width="44" height="26" rx="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="42" cy="69" r="3" fill="#2E7D32"/>
    <circle cx="52" cy="69" r="3" fill="#2E7D32"/>

    <!-- Router 3 -->
    <rect x="10" y="102" width="44" height="26" rx="4" fill="#ffffff" opacity="0.6"/>
    <circle cx="22" cy="115" r="3" fill="#2E7D32"/>
    <circle cx="32" cy="115" r="3" fill="#2E7D32"/>

    <!-- Connection lines between routers -->
    <line x1="22" y1="36" x2="52" y2="56" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="52" y1="82" x2="32" y2="102" stroke="#ffffff" stroke-width="1.5"/>
  </g>
</svg>
