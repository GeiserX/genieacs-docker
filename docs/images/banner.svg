<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Container/server icon -->
  <g transform="translate(80, 55)">
    <!-- Container box -->
    <rect x="0" y="0" width="80" height="90" rx="6" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- Container layers -->
    <line x1="0" y1="30" x2="80" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="60" x2="80" y2="60" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <!-- Status dots -->
    <circle cx="15" cy="15" r="4" fill="#4CAF50" opacity="0.9"/>
    <circle cx="15" cy="45" r="4" fill="#4CAF50" opacity="0.7"/>
    <circle cx="15" cy="75" r="4" fill="#4CAF50" opacity="0.5"/>
    <!-- Labels -->
    <rect x="28" y="11" width="38" height="8" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="28" y="41" width="30" height="8" rx="2" fill="#ffffff" opacity="0.25"/>
    <rect x="28" y="71" width="34" height="8" rx="2" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- WiFi/signal arcs (from logo) -->
  <g transform="translate(130, 40)" opacity="0.4">
    <path d="M0,0 A18,18 0 0,1 12,-12" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,0 A30,30 0 0,1 20,-20" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="200" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-1">
    GenieACS Docker
  </text>

  <!-- Subtitle -->
  <text x="202" y="132" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Production-ready containers and Helm charts for TR-069
  </text>

  <!-- Decorative: small router icons on right -->
  <g transform="translate(760, 60)" opacity="0.15">
    <rect x="0" y="0" width="40" height="25" rx="4" fill="#ffffff"/>
    <circle cx="10" cy="12" r="3" fill="#2E7D32"/>
    <circle cx="20" cy="12" r="3" fill="#2E7D32"/>
    <rect x="20" y="40" width="40" height="25" rx="4" fill="#ffffff"/>
    <circle cx="30" cy="52" r="3" fill="#2E7D32"/>
    <circle cx="40" cy="52" r="3" fill="#2E7D32"/>
    <rect x="40" y="80" width="40" height="25" rx="4" fill="#ffffff"/>
    <circle cx="50" cy="92" r="3" fill="#2E7D32"/>
    <circle cx="60" cy="92" r="3" fill="#2E7D32"/>
    <!-- Connection lines -->
    <line x1="20" y1="25" x2="40" y2="40" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="40" y1="65" x2="60" y2="80" stroke="#ffffff" stroke-width="1.5"/>
  </g>
</svg>
